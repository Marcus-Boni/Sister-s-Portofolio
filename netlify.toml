# ─────────────────────────────────────────────────────────────
#  netlify.toml — Portfolio Isadora Galvão Boni
# ─────────────────────────────────────────────────────────────

# ── Build ────────────────────────────────────────────────────
[build]
  command     = "pnpm run build"
  publish     = "dist"
  environment = { NODE_VERSION = "20" }

# ── SPA redirect — qualquer rota → index.html ────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Headers globais de segurança ─────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Cache imutável para assets com hash (JS/CSS do Vite) ─────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Cache longo para imagens do portfólio ────────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ── Cache moderado para fontes e ícones ──────────────────────
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type  = "application/manifest+json"
    Cache-Control = "public, max-age=3600"
