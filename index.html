<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport & Theme ───────────────────────────────── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F2EDE4" />

    <!-- ── Ícones ─────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- ── Apple PWA ──────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Isadora Galvão Boni" />

    <!-- ── SEO básico ─────────────────────────────────────── -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Isadora Galvão Boni" />
    <meta
      name="description"
      content="Isadora Galvão Boni — Modelo & Digital Influencer. Editorial, moda, lifestyle, fitness e beauty. Guarapari, ES."
    />
    <link rel="canonical" href="https://isadoragboni.netlify.app/" />

    <!-- ── Open Graph ─────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Isadora Galvão Boni" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:url" content="https://isadoragboni.netlify.app/" />
    <meta property="og:title" content="Isadora Galvão Boni — Modelo & Digital Influencer" />
    <meta
      property="og:description"
      content="Portfólio editorial. Da moda casual e praia ao fitness e lifestyle."
    />
    <meta
      property="og:image"
      content="https://isadoragboni.netlify.app/images/beauty-corset-azul.webp"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1600" />
    <meta property="og:image:alt" content="Retrato de Isadora Galvão Boni com corset azul-claro" />

    <!-- ── Twitter / X Cards ──────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Isadora Galvão Boni — Modelo & Digital Influencer" />
    <meta
      name="twitter:description"
      content="Portfólio editorial. Da moda casual e praia ao fitness e lifestyle."
    />
    <meta
      name="twitter:image"
      content="https://isadoragboni.netlify.app/images/beauty-corset-azul.webp"
    />

    <!-- ── Fontes ──────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Archivo:ital,wdth,wght@0,62..125,100..900;1,62..125,100..900&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Archivo:ital,wdth,wght@0,62..125,100..900;1,62..125,100..900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Archivo:ital,wdth,wght@0,62..125,100..900;1,62..125,100..900&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- ── Preload da imagem hero (LCP) ───────────────────── -->
    <link
      rel="preload"
      as="image"
      href="/images/beauty-golden-hour-800.webp"
      imagesrcset="/images/beauty-golden-hour-800.webp 800w, /images/beauty-golden-hour.webp 1064w"
      imagesizes="(max-width: 768px) 80vw, 50vw"
      type="image/webp"
    />

    <title>Isadora Galvão Boni — Modelo & Digital Influencer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
